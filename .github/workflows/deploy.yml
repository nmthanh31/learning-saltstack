name: Salt Deploy

on:
  push:
    paths:
      - "nginx/**"
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH Deploy to Salt Master
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.MASTER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            salt '*' state.apply nginx