name: Salt Deploy

on:
  push:
    paths:
      - "nginx/**"
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Copy state to /srv/salt
        run: |
          sudo rm -rf /srv/salt/*
          sudo cp -r nginx /srv/salt/

      - name: Apply Salt
        run: sudo salt '*' state.apply nginx